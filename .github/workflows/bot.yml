name: Oracle VPS Sniper

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  pescar-vaga:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código
      uses: actions/checkout@v3

    - name: Preparar o PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Instalar dependências
      run: composer install --no-dev

    - name: Montar a configuração (Modo Blindado)
      run: |
        cat << 'EOF' > oracle.pem
        ${{ secrets.OCI_PRIVATE_KEY }}
        EOF
        
        cat << 'EOF' > .env
        OCI_USER_ID=${{ secrets.OCI_USER_ID }}
        OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
        OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
        OCI_REGION=${{ secrets.OCI_REGION }}
        OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
        OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
        OCI_OCPUS=4
        OCI_MEMORY_IN_GBS=24
        OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}
        OCI_SHAPE=VM.Standard.A1.Flex
        OCI_PRIVATE_KEY_FILENAME=oracle.pem
        EOF
        
        # Limpa aspas e quebras de linha perdidas da chave SSH
        export SSH_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
        SSH_CLEAN=$(echo "$SSH_KEY" | tr -d '"' | tr -d '\n' | tr -d '\r')
        echo "OCI_SSH_PUBLIC_KEY=\"$SSH_CLEAN\"" >> .env

    - name: Tentar criar a máquina na Oracle
      run: php index.php
