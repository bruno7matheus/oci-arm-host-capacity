name: Oracle VPS Sniper

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  pescar-vaga:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código
      uses: actions/checkout@v3

    - name: Preparar o PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Instalar dependências
      run: composer install --no-dev

    - name: Montar a configuração (Modo Infalível)
      env:
        PRIV_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      run: |
        echo "$PRIV_KEY" > oracle.pem
        
        cat << 'EOF' > .env
        OCI_USER_ID=ocid1.user.oc1..aaaaaaaadbdmbjyvaet5yz6ku7qxclwpbzdzycbwh3pvzbeyihgr3n2leooq
        OCI_TENANCY_ID=ocid1.tenancy.oc1..aaaaaaaaliyp2lvika6atguhzc2gojd32oeyl4adfdcdnnieku3nets2czwa
        OCI_KEY_FINGERPRINT=46:30:e9:c9:91:9a:08:8d:96:02:74:c4:f5:05:ee:b2
        OCI_REGION=us-ashburn-1
        OCI_SUBNET_ID=ocid1.subnet.oc1.iad.aaaaaaaadcemfmkbf564rbwvrthlyqfm3s34rw6dgtezbtbhcqmwgfqmuxkq
        OCI_IMAGE_ID=ocid1.image.oc1.iad.aaaaaaaaccnswiekwi4w3pkmygjvfk24epduwj7uvq2smjmznu4kq6dcs27a
        OCI_OCPUS=4
        OCI_MEMORY_IN_GBS=24
        OCI_AVAILABILITY_DOMAIN=VtYI:US-ASHBURN-AD-3
        OCI_SHAPE=VM.Standard.A1.Flex
        OCI_PRIVATE_KEY_FILENAME=oracle.pem
        OCI_SSH_PUBLIC_KEY="ssh-rsa  ssh-key-2026-03-19"
        EOF

    - name: Tentar criar a máquina na Oracle
      run: php index.php
