name: Oracle VPS Sniper

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  pescar-vaga:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código
      uses: actions/checkout@v3

    - name: Preparar o PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Instalar dependências
      run: composer install --no-dev

    - name: Montar a configuração (Modo Ultra Blindado)
      env:
        PRIV_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        PUB_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        USER_ID: ${{ secrets.OCI_USER_ID }}
        TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
        FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
        REGION: ${{ secrets.OCI_REGION }}
        SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
        IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
        AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      run: |
        echo "$PRIV_KEY" > oracle.pem
        
        echo "OCI_USER_ID=$USER_ID" > .env
        echo "OCI_TENANCY_ID=$TENANCY_ID" >> .env
        echo "OCI_KEY_FINGERPRINT=$FINGERPRINT" >> .env
        echo "OCI_REGION=$REGION" >> .env
        echo "OCI_SUBNET_ID=$SUBNET_ID" >> .env
        echo "OCI_IMAGE_ID=$IMAGE_ID" >> .env
        echo "OCI_OCPUS=4" >> .env
        echo "OCI_MEMORY_IN_GBS=24" >> .env
        echo "OCI_AVAILABILITY_DOMAIN=$AVAILABILITY_DOMAIN" >> .env
        echo "OCI_SHAPE=VM.Standard.A1.Flex" >> .env
        echo "OCI_PRIVATE_KEY_FILENAME=oracle.pem" >> .env
        
        # Limpa aspas e quebras de linha perdidas da chave publica
        PUB_CLEAN=$(echo "$PUB_KEY" | tr -d '"' | tr -d '\n' | tr -d '\r')
        echo "OCI_SSH_PUBLIC_KEY=\"$PUB_CLEAN\"" >> .env

    - name: Tentar criar a máquina na Oracle
      run: php index.php
